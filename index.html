<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .viewer-container {
            position: relative;
            max-width: 100%;
            user-select: none;
        }

        .viewer {
            cursor: grab;
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }

        .viewer:active {
            cursor: grabbing;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
        }

        .progress-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s;
        }

        .hint.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <img id="viewer" class="viewer" src="images/MAIN_360_diffuse_00000.jpg" alt="360 View">
        <div class="loading" id="loading">Loading: <span id="loadingProgress">0</span>%</div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="hint" id="hint">Drag left/right to rotate</div>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const loadingProgress = document.getElementById('loadingProgress');
        const hint = document.getElementById('hint');

        const totalFrames = 100;
        const images = [];
        let currentFrame = 0;
        let isDragging = false;
        let startX = 0;
        let frameAtDragStart = 0;
        const sensitivity = 3;

        let loadedCount = 0;
        for (let i = 0; i < totalFrames; i++) {
            const img = new Image();
            const frameNum = String(i).padStart(5, '0');
            img.src = `images/MAIN_360_diffuse_${frameNum}.jpg`;
            img.onload = () => {
                loadedCount++;
                const percent = Math.round((loadedCount / totalFrames) * 100);
                loadingProgress.textContent = percent;
                progressFill.style.width = percent + '%';
                if (loadedCount === totalFrames) {
                    loading.style.display = 'none';
                    progressBar.style.display = 'none';
                }
            };
            images.push(img);
        }

        function updateFrame(frame) {
            currentFrame = ((frame % totalFrames) + totalFrames) % totalFrames;
            viewer.src = images[currentFrame].src;
        }

        viewer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            frameAtDragStart = currentFrame;
            hint.classList.add('hidden');
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const frameDelta = Math.round(deltaX / sensitivity);
            updateFrame(frameAtDragStart - frameDelta);
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        viewer.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            frameAtDragStart = currentFrame;
            hint.classList.add('hidden');
            e.preventDefault();
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const frameDelta = Math.round(deltaX / sensitivity);
            updateFrame(frameAtDragStart - frameDelta);
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
